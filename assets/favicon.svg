<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Hanko-style vermillion square seal -->
  <rect x="4" y="4" width="56" height="56" rx="6" fill="#C8102E"/>
  <!-- Clean white T mark, slightly inset -->
  <g fill="#F7F4EE">
    <!-- horizontal stroke -->
    <rect x="14" y="18" width="36" height="6" rx="1"/>
    <!-- vertical stroke -->
    <rect x="29" y="24" width="6" height="26" rx="1"/>
  </g>
  <!-- Subtle inner border for the seal feel -->
  <rect x="7" y="7" width="50" height="50" rx="4" fill="none" stroke="#F7F4EE" stroke-width="0.6" opacity="0.35"/>
</svg>
